# ── Lokální vývoj (Zenbook) ──────────────────────────────────
# Frontend: npm run dev (Vite na :5173, proxy /api → backend)
# Backend:  docker compose up -d backend (port 3001→3000)

services:
  backend:
    image: node:20-alpine
    container_name: nelazahradnice-portal-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - backend_node_modules:/app/node_modules
    env_file:
      - backend/.env
    command: sh -c "rm -f package-lock.json && npm install && node server.js"
    ports:
      - "3001:3000"

volumes:
  backend_node_modules:
